<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CVENS — Team Dashboard</title>
<style>
  :root {
    --glass-bg: rgba(40, 40, 45, 0.18);
    --glass-bg-strong: rgba(60, 60, 65, 0.26);
    --glass-border: rgba(255, 255, 255, 0.14);
    --glass-border-strong: rgba(255, 255, 255, 0.22);
    --text: #ffffff;
    --text-dim: rgba(255, 255, 255, 0.65);
    --text-faint: rgba(255, 255, 255, 0.45);
    --pill-bg: rgba(255, 255, 255, 0.12);
    --active-bg: rgba(255, 255, 255, 0.10);
    --accent: rgba(120, 160, 220, 0.28);
    --accent-strong: rgba(160, 195, 240, 0.38);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI",
      Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  body {
    height: 100vh;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(80, 60, 110, 0.38) 0%, transparent 55%),
      radial-gradient(ellipse at 100% 100%, rgba(40, 80, 120, 0.32) 0%, transparent 55%),
      linear-gradient(155deg, #181821 0%, #0e0e15 50%, #06060c 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 24px;
  }

  /* ---- icon rail ---- */
  .stage { position: relative; width: min(1500px, 100%); height: 100%; }
  .icon-rail {
    position: absolute;
    left: -8px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 18px;
    padding: 14px 10px;
    background: rgba(30, 30, 35, 0.35);
    backdrop-filter: blur(28px) saturate(140%);
    -webkit-backdrop-filter: blur(28px) saturate(140%);
    border: 1px solid var(--glass-border);
    border-radius: 28px;
    z-index: 3;
  }
  .icon-rail button {
    width: 40px; height: 40px;
    border-radius: 14px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-dim);
    display: grid; place-items: center;
    cursor: pointer;
    transition: 160ms ease;
  }
  .icon-rail button:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .icon-rail button.active {
    background: rgba(255, 255, 255, 0.14);
    border-color: var(--glass-border-strong);
    color: var(--text);
  }
  .icon-rail svg { width: 20px; height: 20px; }

  /* ---- main glass card with topbar + 3-col layout ---- */
  .card {
    position: relative;
    display: grid;
    grid-template-columns: 260px 1fr 340px;
    grid-template-rows: 72px 1fr;
    grid-template-areas:
      "topbar topbar topbar"
      "sidebar main memo";
    background: var(--glass-bg);
    backdrop-filter: blur(40px) saturate(160%);
    -webkit-backdrop-filter: blur(40px) saturate(160%);
    border: 1px solid var(--glass-border-strong);
    border-radius: 28px;
    overflow: hidden;
    box-shadow:
      0 30px 80px rgba(0,0,0,0.45),
      inset 0 1px 0 rgba(255,255,255,0.08);
    height: 100%;
  }
  .topbar { grid-area: topbar; }
  .sidebar { grid-area: sidebar; min-height: 0; overflow-y: auto; }
  .main { grid-area: main; min-height: 0; overflow-y: auto; }
  .memo { grid-area: memo; min-height: 0; }

  /* ---- topbar (CVENS + global search) ---- */
  .topbar {
    position: relative;
    display: flex;
    align-items: center;
    gap: 22px;
    padding: 0 28px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 240px;
  }
  .brand .logo {
    width: 32px; height: 32px;
    border-radius: 10px;
    background: linear-gradient(135deg, #7aa1d8 0%, #b07ec8 100%);
    box-shadow: 0 4px 14px rgba(120, 160, 220, 0.45);
    display: grid; place-items: center;
    font-weight: 700;
    font-size: 13px;
    color: #fff;
    letter-spacing: 0.04em;
  }
  .brand h1 {
    margin: 0;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.18em;
    background: linear-gradient(135deg, #ffffff 0%, #c8d6f0 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .global-search {
    flex: 1;
    max-width: 600px;
    display: flex;
    align-items: center;
    gap: 12px;
    height: 42px;
    padding: 0 16px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
  }
  .global-search:focus-within {
    border-color: var(--accent-strong);
    background: rgba(255, 255, 255, 0.09);
  }
  .global-search svg { width: 18px; height: 18px; color: var(--text-dim); }
  .global-search input {
    flex: 1;
    background: transparent;
    border: 0;
    outline: 0;
    color: var(--text);
    font-size: 14px;
  }
  .global-search input::placeholder { color: var(--text-faint); }
  .global-search .kbd {
    font-size: 10.5px;
    color: var(--text-faint);
    border: 1px solid var(--glass-border);
    border-radius: 6px;
    padding: 2px 6px;
    letter-spacing: 0.04em;
  }
  .topbar .top-actions {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }
  .topbar .top-actions button {
    width: 38px; height: 38px;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--glass-border);
    color: var(--text-dim);
    display: grid; place-items: center;
    cursor: pointer;
    transition: 160ms ease;
  }
  .topbar .top-actions button:hover { background: rgba(255,255,255,0.14); color: var(--text); }
  .topbar .top-actions svg { width: 17px; height: 17px; }

  /* ---- sidebar ---- */
  .sidebar {
    padding: 24px 22px 28px 28px;
    border-right: 1px solid rgba(255,255,255,0.08);
  }
  .sidebar-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 18px;
  }
  .sidebar-head h2 {
    margin: 0;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .sidebar-head .sub { margin-top: 4px; font-size: 12.5px; color: var(--text-dim); }
  .sidebar-actions { display: flex; gap: 6px; align-items: center; margin-top: 4px; }
  .sidebar-actions .add-btn,
  .sidebar-actions .edit-toggle {
    width: 28px; height: 28px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--glass-border);
    color: var(--text-dim);
    display: grid; place-items: center;
    cursor: pointer;
    transition: 160ms ease;
    padding: 0;
  }
  .sidebar-actions .add-btn:hover,
  .sidebar-actions .edit-toggle:hover {
    background: var(--accent);
    border-color: var(--accent-strong);
    color: var(--text);
  }
  .sidebar-actions .add-btn svg,
  .sidebar-actions .edit-toggle svg { width: 14px; height: 14px; }
  .sidebar-actions .add-btn { display: none; }
  .editing > .sidebar-head .sidebar-actions .add-btn { display: grid; }
  .sidebar-actions .edit-toggle.active {
    background: rgba(127, 200, 156, 0.32);
    border-color: rgba(127, 200, 156, 0.55);
    color: #fff;
  }
  .editing > .sidebar-head { background: rgba(127, 200, 156, 0.06); border-radius: 12px; padding: 4px; margin: -4px -4px 14px; }

  /* sidebar tree (folders → items) */
  .sidebar-tree { display: flex; flex-direction: column; gap: 2px; }

  .sb-folder-group { display: flex; flex-direction: column; }
  .sb-folder {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    border-radius: 10px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    user-select: none;
    transition: 160ms ease;
  }
  .sb-folder:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .sb-folder .chev {
    width: 12px; height: 12px;
    transition: transform 200ms ease;
    color: var(--text-faint);
    flex: 0 0 auto;
  }
  .sb-folder-group.expanded > .sb-folder .chev { transform: rotate(90deg); color: var(--text-dim); }
  .sb-folder .fname { flex: 1; }
  .sb-folder .folder-actions { display: none; gap: 3px; margin-left: auto; }
  .editing .sb-folder .folder-actions { display: flex; }
  .folder-actions button,
  .item-actions button {
    width: 20px; height: 20px;
    border-radius: 6px;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--glass-border);
    color: var(--text-dim);
    display: grid; place-items: center;
    cursor: pointer; padding: 0;
  }
  .folder-actions button:hover,
  .item-actions button:hover { background: rgba(255,255,255,0.16); color: var(--text); }
  .folder-actions svg,
  .item-actions svg { width: 11px; height: 11px; }
  .folder-actions .danger:hover,
  .item-actions .danger:hover { background: rgba(220,90,90,0.45); color: #fff; }

  .sb-children {
    display: none;
    margin-left: 14px;
    padding-left: 10px;
    border-left: 1px solid rgba(255,255,255,0.10);
    flex-direction: column;
    gap: 2px;
    margin-top: 2px;
    margin-bottom: 6px;
  }
  .sb-folder-group.expanded > .sb-children { display: flex; }

  .sb-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    border-radius: 11px;
    color: var(--text-dim);
    font-size: 13.5px;
    cursor: default;
    border: 1px solid transparent;
    transition: 160ms ease;
  }
  .sb-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .sb-item.active {
    background: var(--active-bg);
    color: var(--text);
    border-color: var(--glass-border-strong);
  }
  .editing .sb-item { cursor: pointer; }
  .editing .sb-item:hover { box-shadow: 0 0 0 1px rgba(127,200,156,0.45); }
  .sb-item .item-bullet {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text-faint);
    flex: 0 0 auto;
  }
  .sb-item .label { flex: 1; }
  .sb-item .count {
    font-size: 11.5px;
    color: var(--text-dim);
    background: rgba(255,255,255,0.06);
    padding: 1px 8px;
    border-radius: 999px;
  }
  .sb-item .item-actions { display: none; gap: 3px; }
  .editing .sb-item .item-actions { display: flex; }

  /* ---- main scrollable area ---- */
  .main { padding: 22px 30px 28px; }

  /* ---- section head (with optional + button) ---- */
  .section-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 4px;
    margin-bottom: 14px;
    user-select: none;
  }
  .section-head h3 {
    margin: 0;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  .section-head .badge {
    padding: 2px 10px;
    font-size: 11.5px;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--glass-border);
    border-radius: 999px;
    color: var(--text-dim);
  }
  .section-head .spacer { flex: 1; }
  .section-head .add-btn,
  .section-head .icon-btn-sm,
  .section-head .edit-toggle {
    width: 28px; height: 28px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--glass-border);
    color: var(--text-dim);
    display: grid; place-items: center;
    cursor: pointer;
    transition: 160ms ease;
    padding: 0;
  }
  .section-head .add-btn:hover,
  .section-head .icon-btn-sm:hover,
  .section-head .edit-toggle:hover {
    background: var(--accent);
    border-color: var(--accent-strong);
    color: var(--text);
  }
  .section-head .add-btn svg,
  .section-head .icon-btn-sm svg,
  .section-head .edit-toggle svg { width: 14px; height: 14px; }
  .section-head .edit-toggle.active {
    background: rgba(127, 200, 156, 0.32);
    border-color: rgba(127, 200, 156, 0.55);
    color: #fff;
  }
  /* add-btn only visible while editing */
  .section-head .add-btn { display: none; }
  .editing .section-head .add-btn { display: grid; }
  /* subtle "in edit mode" outline on the section */
  .editing > .section-head { background: rgba(127, 200, 156, 0.06); border-radius: 12px; }

  .section-head .chevron {
    width: 18px; height: 18px;
    color: var(--text-dim);
    transition: transform 480ms cubic-bezier(.4,.2,.2,1);
    cursor: pointer;
  }

  /* ---- quick links row ---- */
  .quick-links {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 12px;
    margin-top: 4px;
    margin-bottom: 6px;
  }
  .q-link {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    background: transparent;
    border: 0; padding: 0; color: inherit; font-family: inherit;
  }
  .q-link .icon {
    width: 58px; height: 58px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--glass-border);
    display: grid; place-items: center;
    color: var(--text);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    transition: 200ms ease;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
  }
  .q-link .icon svg { width: 24px; height: 24px; }
  .q-link:hover .icon {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.16);
    border-color: var(--glass-border-strong);
  }
  .q-link .label {
    font-size: 11.5px;
    color: var(--text-dim);
  }
  .q-link:hover .label { color: var(--text); }
  .q-link { cursor: default; }
  .q-link .del {
    position: absolute;
    top: -4px; right: 4px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: rgba(220, 90, 90, 0.75);
    border: 1px solid rgba(255,180,180,0.4);
    color: #fff;
    font-size: 11px; line-height: 1;
    display: none;
    place-items: center;
    cursor: pointer;
    padding: 0;
  }
  /* edit affordances only visible in edit mode */
  .editing .q-link { cursor: pointer; }
  .editing .q-link .del { display: grid; }
  .editing .q-link:hover .icon { box-shadow: inset 0 1px 0 rgba(255,255,255,0.10), 0 0 0 1px rgba(127,200,156,0.45); }

  /* per-color soft tints for quick links */
  .qc-red    .icon { background: linear-gradient(135deg, rgba(232,116,116,0.32), rgba(180,80,80,0.18)); }
  .qc-blue   .icon { background: linear-gradient(135deg, rgba(120,170,230,0.32), rgba(70,110,170,0.18)); }
  .qc-amber  .icon { background: linear-gradient(135deg, rgba(238,196,86,0.30), rgba(180,140,60,0.18)); }
  .qc-purple .icon { background: linear-gradient(135deg, rgba(196,124,212,0.30), rgba(132,80,160,0.18)); }
  .qc-teal   .icon { background: linear-gradient(135deg, rgba(96,196,196,0.32), rgba(50,130,140,0.18)); }
  .qc-orange .icon { background: linear-gradient(135deg, rgba(232,150,90,0.32), rgba(170,100,60,0.18)); }
  .qc-green  .icon { background: linear-gradient(135deg, rgba(118,196,140,0.32), rgba(70,140,100,0.18)); }
  .qc-gray   .icon { background: linear-gradient(135deg, rgba(170,170,180,0.30), rgba(100,100,110,0.18)); }
  .qc-pink   .icon { background: linear-gradient(135deg, rgba(232,140,180,0.32), rgba(180,90,130,0.18)); }

  /* ---- team goals ---- */
  .goals { margin-top: 22px; }
  .goals-deck {
    position: relative;
    height: 142px;
    transition: height 480ms cubic-bezier(.4,.2,.2,1);
  }
  .goals.open .goals-deck { height: 304px; }

  .goal-card {
    position: absolute;
    top: 0; left: 0;
    width: calc(50% - 6px);
    height: 142px;
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 14px 18px 16px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: transform 480ms cubic-bezier(.4,.2,.2,1), background 200ms ease;
    cursor: pointer;
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    box-shadow: 0 8px 22px rgba(0,0,0,0.28);
  }
  .goal-card { cursor: default; }
  .goal-card:hover { background: rgba(255,255,255,0.12); }
  .editing .goal-card { cursor: pointer; }
  .editing .goal-card:hover { box-shadow: 0 8px 22px rgba(0,0,0,0.28), 0 0 0 1px rgba(127,200,156,0.45); }

  /* dynamic transforms set via inline style during render */

  .goal-name {
    font-size: 13.5px;
    color: var(--text);
    font-weight: 500;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    padding-right: 28px;
  }
  .goal-actions {
    position: absolute;
    top: 8px; right: 8px;
    display: none;
    gap: 4px;
  }
  .editing .goal-actions { display: flex; }
  .goal-actions button {
    width: 22px; height: 22px;
    border-radius: 7px;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--glass-border);
    color: var(--text-dim);
    display: grid; place-items: center;
    cursor: pointer;
    padding: 0;
  }
  .goal-actions button:hover { color: var(--text); background: rgba(255,255,255,0.16); }
  .goal-actions svg { width: 12px; height: 12px; }
  .goal-actions .danger:hover { background: rgba(220,90,90,0.35); color: #fff; }

  .goal-progress { display: flex; align-items: baseline; gap: 2px; }
  .goal-progress .pct {
    font-size: 38px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1;
  }
  .goal-progress .pct-sym {
    font-size: 18px;
    color: var(--text-dim);
    font-weight: 500;
    margin-left: 2px;
  }
  .goal-bar {
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    overflow: hidden;
    margin-top: 6px;
  }
  .goal-bar > span {
    display: block; height: 100%;
    background: linear-gradient(90deg, #7aa1d8, #b07ec8);
    border-radius: 999px;
  }
  .goal-people { display: flex; align-items: center; }
  .avatar-sm {
    width: 26px; height: 26px;
    border-radius: 50%;
    display: grid; place-items: center;
    font-size: 11px; font-weight: 600; color: #fff;
    border: 2px solid rgba(35,35,40,0.65);
    margin-left: -7px;
  }
  .avatar-sm:first-child { margin-left: 0; }
  .a-go  { background: linear-gradient(135deg, #7aa1d8, #4f6e9c); }
  .a-yu  { background: linear-gradient(135deg, #d8819f, #a14d6f); }
  .a-jun { background: linear-gradient(135deg, #7fc89c, #4f8e6c); }

  /* ---- timeline range ---- */
  .timeline { margin-top: 28px; padding-bottom: 12px; }
  .timeline .section-head .range-input {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    font-size: 11.5px;
    color: var(--text-dim);
  }
  .timeline .section-head .range-input input {
    background: transparent;
    border: 0;
    color: var(--text);
    font-size: 11.5px;
    font-family: inherit;
    color-scheme: dark;
    width: 110px;
    cursor: pointer;
  }
  .timeline .section-head .range-input input::-webkit-calendar-picker-indicator { filter: invert(0.8); cursor: pointer; }
  .timeline .section-head .range-sep { color: var(--text-faint); font-size: 11.5px; }

  .timeline-range {
    position: relative;
    padding: 30px 20px 18px;
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--glass-border);
    border-radius: 18px;
    overflow: hidden;
  }
  /* month axis at top */
  .t-months {
    position: absolute;
    top: 8px;
    left: 20px; right: 20px;
    height: 14px;
    pointer-events: none;
    z-index: 0;
  }
  .t-month {
    position: absolute;
    transform: translateX(-50%);
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .t-month::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 16px;
    width: 1px; height: 9999px;
    background: rgba(255,255,255,0.06);
    transform: translateX(-50%);
  }
  /* TODAY marker (vertical dashed) */
  .t-today {
    position: absolute;
    top: 26px; bottom: 12px;
    width: 0;
    border-left: 2px dashed rgba(255, 220, 100, 0.55);
    z-index: 2;
    pointer-events: none;
  }
  .t-today::after {
    content: 'TODAY';
    position: absolute;
    top: -16px; left: -22px;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: rgba(255,220,100,0.9);
    background: rgba(40,40,45,0.7);
    padding: 1px 6px;
    border-radius: 6px;
    border: 1px solid rgba(255,220,100,0.3);
  }
  /* Gantt lanes */
  .t-lanes {
    position: relative;
    margin-top: 22px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 1;
    min-height: 28px;
  }
  .t-lane { position: relative; height: 28px; }
  .t-bar {
    position: absolute;
    top: 0;
    height: 28px;
    min-width: 14px;
    border-radius: 9px;
    padding: 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    cursor: default;
    overflow: hidden;
    border: 1px solid;
    background: rgba(255,255,255,0.06);
    border-color: var(--glass-border);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    transition: 200ms ease;
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
  }
  .t-bar:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,0,0,0.28); }
  .t-bar .t-bar-title {
    flex: 1 1 auto;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .t-bar .t-bar-dates {
    font-size: 10.5px;
    opacity: 0.78;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
    flex: 0 0 auto;
  }
  .t-bar .t-actions {
    position: absolute;
    top: -10px;
    right: -10px;
    display: none;
    gap: 4px;
    z-index: 5;
  }
  .editing .t-bar { cursor: pointer; }
  .editing .t-bar .t-actions { display: flex; }
  .editing .t-bar:hover { box-shadow: 0 0 0 1px rgba(127,200,156,0.55), 0 6px 18px rgba(0,0,0,0.28); }
  .t-bar .t-actions button {
    width: 20px; height: 20px;
    border-radius: 6px;
    background: rgba(40,40,45,0.85);
    border: 1px solid var(--glass-border);
    color: var(--text);
    display: grid; place-items: center;
    cursor: pointer; padding: 0;
  }
  .t-bar .t-actions svg { width: 11px; height: 11px; }
  .t-bar .t-actions .danger:hover { background: rgba(220,90,90,0.7); }
  /* category color variants */
  .t-bar.cat-plan   { background: rgba(196,124,212,0.34); border-color: rgba(196,124,212,0.55); }
  .t-bar.cat-design { background: rgba(216,129,159,0.34); border-color: rgba(216,129,159,0.55); }
  .t-bar.cat-dev    { background: rgba(122,161,216,0.34); border-color: rgba(122,161,216,0.55); }
  .t-bar.cat-qa     { background: rgba(221,196,109,0.34); border-color: rgba(221,196,109,0.55); }
  .t-bar.cat-ops    { background: rgba(127,200,156,0.34); border-color: rgba(127,200,156,0.55); }
  .t-bar.cat-launch { background: rgba(109,200,200,0.34); border-color: rgba(109,200,200,0.55); }
  /* status modifiers */
  .t-bar.done { opacity: 0.55; }
  .t-bar.done .t-bar-title { text-decoration: line-through; opacity: 0.85; }
  .t-bar.current { box-shadow: 0 0 0 1px rgba(255,255,255,0.45), 0 6px 20px rgba(0,0,0,0.32); }

  /* ---- view switcher (multiple pages) ---- */
  .view { display: none; }
  .view.active { display: block; }

  /* ---- meeting notes (회의록) ---- */
  .meeting-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .meeting-toolbar h2 {
    margin: 0;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
    flex: 1;
  }
  .meeting-toolbar select {
    height: 34px;
    padding: 0 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    color-scheme: dark;
    cursor: pointer;
    outline: 0;
  }
  .meeting-toolbar select option { background: #2a2a30; }
  .meeting-toolbar .icon-btn-sm,
  .meeting-toolbar .add-btn,
  .meeting-toolbar .edit-toggle {
    width: 32px; height: 32px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--glass-border);
    color: var(--text-dim);
    display: grid; place-items: center;
    cursor: pointer; padding: 0;
    transition: 160ms ease;
  }
  .meeting-toolbar .icon-btn-sm:hover,
  .meeting-toolbar .add-btn:hover,
  .meeting-toolbar .edit-toggle:hover {
    background: var(--accent); border-color: var(--accent-strong); color: var(--text);
  }
  .meeting-toolbar .edit-toggle.active {
    background: rgba(127,200,156,0.32);
    border-color: rgba(127,200,156,0.55);
    color: #fff;
  }
  .meeting-toolbar svg { width: 16px; height: 16px; }

  .meeting-page { padding-bottom: 24px; }

  .sort-btn {
    height: 32px;
    padding: 0 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    color: var(--text);
    font-size: 12.5px;
    cursor: pointer;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: 160ms ease;
  }
  .sort-btn:hover { background: rgba(255,255,255,0.12); border-color: var(--glass-border-strong); }

  .meeting-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 24px;
    padding: 4px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    max-height: 240px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.18) transparent;
  }
  .meeting-list::-webkit-scrollbar { width: 6px; }
  .meeting-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.16); border-radius: 6px; }
  .meeting-list:empty { display: none; }
  .ml-empty {
    padding: 14px;
    font-size: 12.5px;
    color: var(--text-faint);
    text-align: center;
  }
  .ml-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid transparent;
    border-radius: 10px;
    cursor: pointer;
    transition: 160ms ease;
    font-size: 13px;
    color: var(--text);
  }
  .ml-item:hover { background: rgba(255,255,255,0.10); }
  .ml-item.active {
    background: rgba(120,160,220,0.22);
    border-color: rgba(160,195,240,0.40);
  }
  .ml-item .ml-date {
    font-size: 12px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
    min-width: 64px;
    flex: 0 0 auto;
  }
  .ml-item.active .ml-date { color: var(--text); }
  .ml-item .ml-title {
    flex: 1 1 auto;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 500;
  }
  .ml-item .ml-stats {
    font-size: 11px;
    color: var(--text-dim);
    flex: 0 0 auto;
    letter-spacing: 0.02em;
  }
  .ml-item .ml-arrow {
    color: var(--text-faint);
    font-size: 12px;
    flex: 0 0 auto;
    opacity: 0;
    transition: 160ms ease;
  }
  .ml-item.active .ml-arrow { opacity: 1; color: var(--text); }

  .callout {
    border-radius: 12px;
    padding: 12px 16px;
    margin: 14px 0 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1px solid;
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
  }
  .callout .ico { width: 18px; height: 18px; flex: 0 0 auto; opacity: 0.95; }
  .co-blue   { background: rgba(72,108,168,0.24);  border-color: rgba(120,160,220,0.45); }
  .co-red    { background: rgba(168,72,72,0.22);   border-color: rgba(220,140,140,0.45); }
  .co-brown  { background: rgba(120,80,40,0.26);   border-color: rgba(180,130,80,0.45); }
  .co-green  { background: rgba(72,140,90,0.22);   border-color: rgba(127,200,156,0.45); }
  .co-gray   { background: rgba(255,255,255,0.06); border-color: var(--glass-border); }

  .meta-list {
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.85;
    padding: 4px 8px 4px 12px;
    border-left: 2px solid rgba(255,255,255,0.10);
    margin: 8px 0 18px;
  }
  .meta-list b { color: var(--text-dim); margin-right: 8px; font-weight: 500; }

  .m-section {
    margin: 6px 0 22px;
    padding: 0 4px;
  }
  .m-section h2 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 6px 0 10px;
    color: var(--text);
  }
  .m-section h3 {
    font-size: 14px;
    font-weight: 600;
    margin: 14px 0 6px;
    color: var(--text-dim);
  }
  .m-section ul {
    list-style: none;
    padding: 0;
    margin: 6px 0;
  }
  .m-section li {
    position: relative;
    padding: 4px 0 4px 18px;
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.55;
  }
  .m-section li::before {
    content: '';
    position: absolute;
    left: 6px; top: 12px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text-faint);
  }
  .m-section .empty {
    font-size: 13px;
    color: var(--text-faint);
    font-style: italic;
    padding: 6px 0 6px 18px;
  }
  .m-section p {
    margin: 6px 0;
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--text);
  }

  .share-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin: 8px 0 4px;
    font-size: 13.5px;
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    overflow: hidden;
  }
  .share-table th,
  .share-table td {
    text-align: left;
    padding: 12px 16px;
    border-bottom: 1px solid var(--glass-border);
  }
  .share-table tr:last-child th,
  .share-table tr:last-child td { border-bottom: 0; }
  .share-table th {
    width: 110px;
    font-weight: 500;
    color: var(--text-dim);
    background: rgba(255,255,255,0.04);
    border-right: 1px solid var(--glass-border);
  }
  .share-table td { color: var(--text); }
  .share-table td:empty::before { content: '—'; color: var(--text-faint); }

  /* ---- topbar popovers (notifications, settings) ---- */
  .pop {
    position: absolute;
    top: 60px;
    right: 28px;
    min-width: 280px;
    background: rgba(40,40,45,0.85);
    backdrop-filter: blur(40px) saturate(160%);
    -webkit-backdrop-filter: blur(40px) saturate(160%);
    border: 1px solid var(--glass-border-strong);
    border-radius: 16px;
    padding: 14px 16px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    color: var(--text);
    z-index: 40;
    display: none;
  }
  .pop.show { display: block; }
  .pop h4 {
    margin: 0 0 8px;
    font-size: 14px;
    font-weight: 600;
  }
  .pop .row {
    padding: 8px 6px;
    font-size: 13px;
    color: var(--text);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .pop .row:last-child { border-bottom: 0; }
  .pop .row .small { font-size: 11.5px; color: var(--text-dim); display: block; margin-top: 3px; }
  .pop button {
    width: 100%;
    margin-top: 6px;
    padding: 8px 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .pop button:hover { background: rgba(255,255,255,0.12); }
  .pop button.danger { background: rgba(220,90,90,0.20); border-color: rgba(220,140,140,0.35); }
  .pop button.danger:hover { background: rgba(220,90,90,0.4); }

  /* ---- right memo panel ---- */
  .memo {
    border-left: 1px solid rgba(255,255,255,0.08);
    display: flex;
    flex-direction: column;
    background: rgba(255,255,255,0.025);
  }
  .memo-head {
    padding: 22px 22px 14px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .memo-head h3 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  .memo-head .sub { margin-top: 4px; font-size: 12px; color: var(--text-dim); }
  .memo-head .icon-btn {
    width: 32px; height: 32px;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--glass-border);
    color: var(--text-dim);
    display: grid; place-items: center;
    cursor: pointer;
  }
  .memo-head .icon-btn svg { width: 16px; height: 16px; }

  .me-chip {
    margin-top: 8px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(120,160,220,0.22);
    border: 1px solid rgba(160,195,240,0.35);
    font-size: 11.5px;
    color: var(--text);
    cursor: pointer;
  }
  .me-chip:hover { background: rgba(120,160,220,0.34); }
  .me-chip .dot { width: 6px; height: 6px; border-radius: 50%; background: #7fd49a; }

  .thread {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.18) transparent;
  }
  .thread::-webkit-scrollbar { width: 6px; }
  .thread::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.16); border-radius: 6px; }

  .day-divider {
    align-self: center;
    font-size: 11px;
    color: var(--text-faint);
    padding: 4px 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--glass-border);
    border-radius: 999px;
    margin: 4px 0;
  }
  .bubble {
    max-width: 88%;
    padding: 9px 13px 7px;
    border-radius: 16px;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    font-size: 13px;
    line-height: 1.45;
    color: var(--text);
    align-self: flex-start;
    border-bottom-left-radius: 6px;
    word-break: break-word;
    box-shadow: 0 2px 6px rgba(0,0,0,0.18);
  }
  .bubble { position: relative; }
  .bubble.me {
    align-self: flex-end;
    background: rgba(120,160,220,0.28);
    border-color: rgba(160,195,240,0.35);
    border-bottom-right-radius: 6px;
    border-bottom-left-radius: 16px;
  }
  .b-actions {
    position: absolute;
    bottom: -10px; left: -8px;
    display: none;
    gap: 4px;
    z-index: 5;
  }
  .bubble.me:hover .b-actions { display: flex; }
  .b-actions button {
    width: 22px; height: 22px;
    border-radius: 7px;
    background: rgba(40,40,45,0.92);
    border: 1px solid var(--glass-border);
    color: var(--text);
    display: grid; place-items: center;
    cursor: pointer; padding: 0;
  }
  .b-actions button:hover { background: rgba(80,80,85,0.95); }
  .b-actions svg { width: 11px; height: 11px; }
  .b-actions .danger:hover { background: rgba(220,90,90,0.75); }
  .bubble .meta {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-top: 5px;
    font-size: 10.5px;
    color: var(--text-faint);
  }
  .bubble .meta .author { color: var(--text-dim); font-weight: 500; }
  .bubble.me .meta .author { color: rgba(220,235,255,0.85); }

  .memo-input {
    padding: 12px 14px 14px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; gap: 8px;
  }
  .memo-input .field {
    flex: 1;
    display: flex; align-items: center; gap: 8px;
    height: 40px;
    padding: 0 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
  }
  .memo-input input {
    flex: 1;
    background: transparent;
    border: 0; outline: 0;
    color: var(--text);
    font-size: 13px;
  }
  .memo-input input::placeholder { color: var(--text-faint); }
  .memo-input .send-btn {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: rgba(120,160,220,0.32);
    border: 1px solid rgba(160,195,240,0.40);
    color: var(--text);
    display: grid; place-items: center;
    cursor: pointer;
    transition: 160ms ease;
  }
  .memo-input .send-btn:hover { background: rgba(120,160,220,0.5); }
  .memo-input .send-btn svg { width: 17px; height: 17px; }

  /* ---- modal (generic) + picker ---- */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }
  .overlay.show { display: flex; }
  .modal-card {
    width: min(420px, 90%);
    background: rgba(40,40,45,0.7);
    backdrop-filter: blur(40px) saturate(160%);
    -webkit-backdrop-filter: blur(40px) saturate(160%);
    border: 1px solid var(--glass-border-strong);
    border-radius: 22px;
    padding: 24px 22px 20px;
    color: var(--text);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }
  .modal-card h3 {
    margin: 0 0 4px;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .modal-card .sub { font-size: 12.5px; color: var(--text-dim); margin-bottom: 16px; }

  .field-group { margin-bottom: 12px; }
  .field-group label {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 5px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .field-group input,
  .field-group select,
  .field-group textarea {
    width: 100%;
    height: 38px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    color: var(--text);
    padding: 0 12px;
    font-size: 13px;
    font-family: inherit;
    outline: 0;
    color-scheme: dark;
  }
  .field-group input:focus,
  .field-group select:focus { border-color: var(--accent-strong); }
  .field-group select option { background: #2a2a30; }
  .field-group .inline-row { display: flex; gap: 8px; }
  .field-group .inline-row > * { flex: 1; }

  .toggle-list { display: flex; gap: 6px; flex-wrap: wrap; }
  .toggle {
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--glass-border);
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .toggle.on {
    background: rgba(120,160,220,0.30);
    border-color: rgba(160,195,240,0.40);
    color: var(--text);
  }
  .toggle.color-swatch {
    width: 28px; height: 28px;
    padding: 0;
    border-radius: 8px;
  }
  .toggle.color-swatch.on { box-shadow: 0 0 0 2px var(--text); }
  .icon-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 6px;
  }
  .icon-grid .icon-pick {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--glass-border);
    color: var(--text-dim);
    display: grid; place-items: center;
    cursor: pointer; padding: 0;
  }
  .icon-grid .icon-pick svg { width: 18px; height: 18px; }
  .icon-grid .icon-pick.on {
    background: rgba(120,160,220,0.28);
    border-color: rgba(160,195,240,0.40);
    color: var(--text);
  }

  .modal-foot {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 18px;
  }
  .btn {
    height: 36px;
    padding: 0 16px;
    border-radius: 11px;
    border: 1px solid var(--glass-border);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-cancel { background: rgba(255,255,255,0.06); }
  .btn-cancel:hover { background: rgba(255,255,255,0.12); }
  .btn-primary {
    background: rgba(120,160,220,0.32);
    border-color: rgba(160,195,240,0.4);
  }
  .btn-primary:hover { background: rgba(120,160,220,0.5); }
  .btn-danger {
    background: rgba(220,90,90,0.25);
    border-color: rgba(220,140,140,0.35);
  }
  .btn-danger:hover { background: rgba(220,90,90,0.5); }

  /* picker (initial user choose) */
  .picker-list { display: flex; flex-direction: column; gap: 10px; }
  .picker-list button {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 16px;
    border-radius: 14px;
    background: rgba(255,255,255,0.06);

          try {

      function el(tag, attrs, children) {
        var n = document.createElement(tag);
        if (attrs) {
          Object.keys(attrs).forEach(function (k) {
            if (k === 'class') n.className = attrs[k];
            else if (k === 'html') n.innerHTML = attrs[k];
            else if (k.indexOf('on') === 0) n.addEventListener(k.slice(2), attrs[k]);
            else if (k === 'style' && typeof attrs[k] === 'object') Object.assign(n.style, attrs[k]);
            else n.setAttribute(k, attrs[k]);
          });
        }
        if (children) {
          (Array.isArray(children) ? children : [children]).forEach(function (c) {
            if (c == null) return;
            n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
          });
        }
        return n;

      function renderGoals() {

          var card = el('article', { 'class': 'goal-card' });
          // collapsed transform (deck stack)
          var collapsedX = i * 7, collapsedY = i * 4, rot = (i % 2 === 0 ? -1.4 : 1.4);
          // expanded transform (2x2 grid via translate)
          var col = i % 2, row = Math.floor(i / 2);
          var expX = col === 0 ? '0' : 'calc(100% + 12px)';
          var expY = row * (deckH + 20);

          }

          // actions

          actions.appendChild(el('button', {

      // ============================================================
      // TIMELINE
      // ============================================================
      function dateToMs(s) { return new Date(s + 'T00:00:00').getTime(); }
      function fmtMd(s) { var d = new Date(s + 'T00:00:00'); return String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0'); }
      function pctOf(date, start, end) {
        var t = dateToMs(date), s = dateToMs(start), e = dateToMs(end);
        if (e <= s) return 0;
        return Math.max(0, Math.min(100, ((t - s) / (e - s)) * 100));
      }

      function renderTimeline() {
        $('rangeStart').value = state.range.start;
        $('rangeEnd').value = state.range.end;

        var months = $('tMonths');
        months.innerHTML = '';
        var s = new Date(state.range.start + 'T00:00:00');
        var eDate = new Date(state.range.end + 'T00:00:00');
        var cursor = new Date(s.getFullYear(), s.getMonth(), 1);
        while (cursor.getTime() <= eDate.getTime()) {
          var iso = cursor.getFullYear() + '-' + String(cursor.getMonth()+1).padStart(2,'0') + '-01';
          var p = pctOf(iso, state.range.start, state.range.end);
          if (p >= 0 && p <= 100) {
            var label = (cursor.getMonth() === 0 ? cursor.getFullYear() + ' ' : '') +
                        ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][cursor.getMonth()];
            months.appendChild(el('div', { 'class': 't-month', style: { left: p + '%' } }, label));
          }
          cursor.setMonth(cursor.getMonth() + 1);
        }

        var today = new Date();
        var todayIso = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
        var todayMs = dateToMs(todayIso);
        var tToday = $('tToday');
        if (todayMs >= dateToMs(state.range.start) && todayMs <= dateToMs(state.range.end)) {
          tToday.style.display = 'block';
          tToday.style.left = pctOf(todayIso, state.range.start, state.range.end) + '%';
        } else {
          tToday.style.display = 'none';
        }

        // events overlapping the range
        var rs = dateToMs(state.range.start), re = dateToMs(state.range.end);
        var visible = state.events.filter(function (ev) {
          var st = dateToMs(ev.start);
          var en = dateToMs(ev.end || ev.start);
          return en >= rs && st <= re;
        });
        // sort by start, then assign lanes greedily (first lane whose lastEnd < this.start)
        var sorted = visible.slice().sort(function (a, b) {
          return dateToMs(a.start) - dateToMs(b.start);
        });
        var lanes = [];
        sorted.forEach(function (ev) {
          var st = dateToMs(ev.start);
          var en = dateToMs(ev.end || ev.start);
          var idx = -1;
          for (var i = 0; i < lanes.length; i++) {
            if (lanes[i].lastEnd < st) { idx = i; break; }
          }
          if (idx === -1) { idx = lanes.length; lanes.push({ events: [], lastEnd: 0 }); }
          lanes[idx].events.push(ev);
          lanes[idx].lastEnd = en;
        });

        var lanesEl = $('tLanes');
        lanesEl.innerHTML = '';
        lanes.forEach(function (lane) {
          var laneDiv = el('div', { 'class': 't-lane' });
          lane.events.forEach(function (ev) {
            var leftPct = Math.max(0, pctOf(ev.start, state.range.start, state.range.end));
            var endPct = Math.min(100, pctOf(ev.end || ev.start, state.range.start, state.range.end));
            var widthPct = Math.max(1.2, endPct - leftPct);
            var st = dateToMs(ev.start), en = dateToMs(ev.end || ev.start);
            var status = en < todayMs ? 'done' : (st <= todayMs && en >= todayMs ? 'current' : '');
            var bar = el('div', {
              'class': 't-bar cat-' + ev.category + (status ? ' ' + status : ''),
              'data-id': ev.id,
              style: { left: leftPct + '%', width: widthPct + '%' },
              onclick: function () { if (bar.closest('.editing')) openEventModal(ev); }
            });
            var rangeText = fmtMd(ev.start) + (ev.end && ev.end !== ev.start ? ' → ' + fmtMd(ev.end) : '');
            bar.appendChild(el('span', { 'class': 't-bar-title' }, ev.title));
            bar.appendChild(el('span', { 'class': 't-bar-dates' }, rangeText));

            var actions = el('div', { 'class': 't-actions' });
            actions.appendChild(el('button', {
              title: '편집',
              onclick: function (e2) { e2.stopPropagation(); openEventModal(ev); }
            }, [iconSvg(['M4 17.5V20h2.5L17 9.5 14.5 7 4 17.5z', 'M14 7l3 3'])]));
            actions.appendChild(el('button', {
              'class': 'danger', title: '삭제',
              onclick: function (e2) {
                e2.stopPropagation();
                if (confirm('"' + ev.title + '" 일정을 삭제할까요?')) {
                  state.events = state.events.filter(function (x) { return x.id !== ev.id; });
                  save(KEYS.events, state.events);
                  renderTimeline();
                }
              }
            }, [iconSvg(['M3 6h18', 'M8 6V4h8v2', 'M6 6l1 14h10l1-14'])]));
            bar.appendChild(actions);
            laneDiv.appendChild(bar);
          });
          lanesEl.appendChild(laneDiv);
        });

        $('timelineBadge').textContent = state.events.length + ' tasks';
      }

      function openEventModal(existing) {
        var seed = existing
          ? Object.assign({}, existing)
          : { id: uid('e'), title: '', start: state.range.start, end: state.range.start, category: 'plan' };
        if (!seed.start) seed.start = seed.date || state.range.start;
        if (!seed.end) seed.end = seed.start;

        var titleI = el('input', { type: 'text', value: seed.title, placeholder: '예: 베타 출시 준비' });
        var startI = el('input', { type: 'date', value: seed.start });
        var endI = el('input', { type: 'date', value: seed.end });
        var catI = el('select');
        CATEGORIES.forEach(function (c) {
          var o = el('option', { value: c.id }, c.name);
          if (c.id === seed.category) o.selected = true;
          catI.appendChild(o);
        });

        var body = el('div');
        body.appendChild(el('div', { 'class': 'field-group' }, [el('label', null, '일정명'), titleI]));
        var row = el('div', { 'class': 'inline-row' });
        row.appendChild(el('div', { 'class': 'field-group', style: { flex: 1 } }, [el('label', null, '시작일'), startI]));
        row.appendChild(el('div', { 'class': 'field-group', style: { flex: 1 } }, [el('label', null, '종료일'), endI]));
        body.appendChild(row);
        body.appendChild(el('div', { 'class': 'field-group' }, [el('label', null, '카테고리'), catI]));

        showModal({
          title: existing ? '일정 편집' : '일정 추가',
          sub: '시작일–종료일 사이에 바 형태로 표시됩니다.',
          body: body,
          showDelete: !!existing,
          onDelete: function () {
            state.events = state.events.filter(function (x) { return x.id !== seed.id; });
            save(KEYS.events, state.events);
            renderTimeline();
            hideModal();
          },
          onSave: function () {
            var s = startI.value || state.range.start;
            var e2 = endI.value || s;
            if (dateToMs(e2) < dateToMs(s)) { var t = s; s = e2; e2 = t; }
            var data = {
              id: seed.id,
              title: (titleI.value || '').trim() || '새 일정',
              start: s, end: e2,
              category: catI.value
            };
            if (existing) {
              state.events = state.events.map(function (x) { return x.id === data.id ? data : x; });
            } else {
              state.events.push(data);
            }
            save(KEYS.events, state.events);
            renderTimeline();
            hideModal();
          }
        });
      }

      // ============================================================
      // MEMOS
      // ============================================================
      function renderMemos() {
        var thread = $('thread');
        thread.innerHTML = '';
        thread.appendChild(el('div', { 'class': 'day-divider' }, 'Today'));
        state.memos.forEach(function (m) {
          var b = el('div', {
            'class': 'bubble' + (m.author === state.user ? ' me' : ''),
            'data-id': m.id,
            'data-author': m.author
          });
          b.appendChild(document.createTextNode(m.text));
          var meta = el('div', { 'class': 'meta' }, [
            el('span', { 'class': 'author' }, m.author),
            el('span', { 'class': 'time' }, m.time)
          ]);
          b.appendChild(meta);
          // own-memo edit/delete actions
          if (m.author === state.user) {
            var bact = el('div', { 'class': 'b-actions' });
            bact.appendChild(el('button', {
              title: '편집',
              onclick: function (e) { e.stopPropagation(); openMemoModal(m); }
            }, [iconSvg(['M4 17.5V20h2.5L17 9.5 14.5 7 4 17.5z', 'M14 7l3 3'])]));
            bact.appendChild(el('button', {
              'class': 'danger', title: '삭제',
              onclick: function (e) {
                e.stopPropagation();
                if (confirm('이 메모를 삭제할까요?')) {
                  state.memos = state.memos.filter(function (x) { return x.id !== m.id; });
                  save(KEYS.memos, state.memos);
                  renderMemos();
                }
              }
            }, [iconSvg(['M3 6h18', 'M8 6V4h8v2', 'M6 6l1 14h10l1-14'])]));
            b.appendChild(bact);
          }
          thread.appendChild(b);
        });
        $('memoCount').textContent = state.memos.length;
        thread.scrollTop = thread.scrollHeight;
      }

      function openMemoModal(m) {
        var textI = document.createElement('textarea');
        textI.value = m.text;
        textI.rows = 4;
        textI.style.cssText = 'width:100%;height:auto;min-height:90px;padding:10px 12px;background:rgba(255,255,255,0.06);border:1px solid var(--glass-border);border-radius:10px;color:var(--text);font-size:13.5px;font-family:inherit;outline:0;resize:vertical;line-height:1.5;';
        var body = el('div');
        body.appendChild(el('div', { 'class': 'field-group' }, [el('label', null, '메모 내용'), textI]));
        showModal({
          title: '메모 편집',
          sub: m.author + ' · ' + m.time,
          body: body,
          showDelete: true,
          onDelete: function () {
            state.memos = state.memos.filter(function (x) { return x.id !== m.id; });
            save(KEYS.memos, state.memos);
            renderMemos();
            hideModal();
          },
          onSave: function () {
            var t = (textI.value || '').trim();
            if (t) {
              m.text = t;
              save(KEYS.memos, state.memos);
              renderMemos();
            }
            hideModal();
          }
        });
      }

      // ============================================================
      // MODAL
      // ============================================================
      var modalCtx = null;
      function showModal(opts) {
        modalCtx = opts;
        $('modalTitle').textContent = opts.title || '';
        $('modalSub').textContent = opts.sub || '';
        var body = $('modalBody');
        body.innerHTML = '';
        if (opts.body) body.appendChild(opts.body);
        var del = $('modalDelete');
        del.style.display = opts.showDelete ? 'inline-flex' : 'none';
        $('modal').classList.add('show');
      }
      function hideModal() {
        modalCtx = null;
        $('modal').classList.remove('show');
      }
      $('modalCancel').addEventListener('click', hideModal);
      $('modalSave').addEventListener('click', function () { if (modalCtx && modalCtx.onSave) modalCtx.onSave(); });
      $('modalDelete').addEventListener('click', function () { if (modalCtx && modalCtx.onDelete) modalCtx.onDelete(); });
      $('modal').addEventListener('click', function (e) { if (e.target.id === 'modal') hideModal(); });

      // build an inline svg element from one or more path d-strings
      function iconSvg(paths) {
        var arr = Array.isArray(paths) ? paths : [paths];
        var html = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">';
        arr.forEach(function (p) { html += '<path d="' + p + '"/>'; });
        html += '</svg>';
        var wrap = document.createElement('span');
        wrap.style.display = 'contents';
        wrap.innerHTML = html;
        return wrap.firstChild;
      }

      // ============================================================
      // USER PICKER
      // ============================================================
      function showPicker() { $('picker').classList.add('show'); }
      function hidePicker() { $('picker').classList.remove('show'); }
      $('pickerList').addEventListener('click', function (e) {
        var btn = e.target.closest('button[data-name]');
        if (!btn) return;
        var name = btn.getAttribute('data-name');
        if (TEAM.indexOf(name) === -1) return;
        state.user = name;
        save(KEYS.user, name);
        $('whoami').textContent = name;
        renderMemos();
        hidePicker();
      });
      $('meChip').addEventListener('click', showPicker);

      // ============================================================
      // GOALS toggle
      // ============================================================
      $('goalsToggle').addEventListener('click', function () {
        $('goals').classList.toggle('open');
        $('goalsChev').style.transform = $('goals').classList.contains('open') ? 'rotate(180deg)' : '';
        renderGoals();
      });

      // ============================================================
      // ADD BUTTONS
      // ============================================================
      $('addQuickLinkBtn').addEventListener('click', function () { openQuickLinkModal(null); });
      $('addGoalBtn').addEventListener('click', function (e) { e.stopPropagation(); openGoalModal(null); });
      $('addEventBtn').addEventListener('click', function () { openEventModal(null); });
      $('addFolderBtn').addEventListener('click', function () { openFolderModal(null); });
      $('addMeetingBtn').addEventListener('click', function () { openMeetingModal(null); });
      $('brandHome').addEventListener('click', function () { setView('dashboardView'); });
      $('memoMoreBtn').addEventListener('click', function () {
        if (!state.user) return;
        var mineCount = state.memos.filter(function (m) { return m.author === state.user; }).length;
        if (!mineCount) { alert('삭제할 본인 메모가 없습니다.'); return; }
        if (confirm('내가 작성한 메모 ' + mineCount + '개를 모두 삭제할까요?')) {
          state.memos = state.memos.filter(function (m) { return m.author !== state.user; });
          save(KEYS.memos, state.memos);
          renderMemos();
        }
      });
      $('editMeeting').addEventListener('click', function () {
        var mt = getCurrentMeeting();
        if (mt) openMeetingModal(mt); else openMeetingModal(null);
      });
      $('sortMeetingBtn').addEventListener('click', function () {
        state.meetingSortDesc = !state.meetingSortDesc;
        save(KEYS.meetingSort, state.meetingSortDesc);
        renderMeetings();
      });

      // ============================================================
      // TOPBAR POPOVERS (bell, settings)
      // ============================================================
      function hideAllPops() {
        document.querySelectorAll('.pop.show').forEach(function (p) { p.classList.remove('show'); });
      }
      function togglePop(id) {
        var p = $(id);
        var wasShown = p.classList.contains('show');
        hideAllPops();
        if (!wasShown) p.classList.add('show');
      }
      $('bellBtn').addEventListener('click', function (e) { e.stopPropagation(); togglePop('bellPop'); });
      $('settingsBtn').addEventListener('click', function (e) {
        e.stopPropagation();
        $('settingsUser').textContent = state.user || '미설정';
        togglePop('settingsPop');
      });
      $('bellPop').addEventListener('click', function (e) { e.stopPropagation(); });
      $('settingsPop').addEventListener('click', function (e) { e.stopPropagation(); });
      $('changeUserBtn').addEventListener('click', function () {
        hideAllPops();
        showPicker();
      });
      $('resetAllBtn').addEventListener('click', function () {
        if (confirm('모든 데이터를 초기 상태로 되돌릴까요?\n작성한 메모, 회의록, 목표, 사이드바 변경 등이 모두 삭제됩니다.')) {
          Object.keys(KEYS).forEach(function (k) {
            try { localStorage.removeItem(KEYS[k]); } catch (e) {}
          });
          location.reload();
        }
      });
      document.addEventListener('click', hideAllPops);

      // ============================================================
      // EDIT-MODE TOGGLES (per section)
      // ============================================================
      function bindEditToggle(toggleId, sectionEl) {
        var btn = $(toggleId);
        if (!btn || !sectionEl) return;
        btn.addEventListener('click', function (e) {
          e.stopPropagation();
          sectionEl.classList.toggle('editing');
          btn.classList.toggle('active', sectionEl.classList.contains('editing'));
          btn.setAttribute('title', sectionEl.classList.contains('editing') ? '편집 완료' : '편집');
        });
      }
      bindEditToggle('editSidebar',    $('sidebarSection'));
      bindEditToggle('editQuickLinks', $('qlSection'));
      bindEditToggle('editGoals',      $('goals'));
      bindEditToggle('editTimeline',   $('timelineSection'));

      // ============================================================
      // RANGE INPUTS
      // ============================================================
      $('rangeStart').addEventListener('change', function () {
        state.range.start = $('rangeStart').value || state.range.start;
        if (dateToMs(state.range.end) < dateToMs(state.range.start)) {
          state.range.end = state.range.start;
          $('rangeEnd').value = state.range.end;
        }
        save(KEYS.range, state.range);
        renderTimeline();
      });
      $('rangeEnd').addEventListener('change', function () {
        state.range.end = $('rangeEnd').value || state.range.end;
        if (dateToMs(state.range.end) < dateToMs(state.range.start)) {
          state.range.start = state.range.end;
          $('rangeStart').value = state.range.start;
        }
        save(KEYS.range, state.range);
        renderTimeline();
      });

      // ============================================================
      // MEMO submit
      // ============================================================
      $('memoForm').addEventListener('submit', function (e) {
        e.preventDefault();
        if (!state.user) { showPicker(); return; }
        var text = $('memoInput').value.trim();
        if (!text) return;
        var now = new Date();
        var hh = String(now.getHours()).padStart(2, '0');
        var mm = String(now.getMinutes()).padStart(2, '0');
        state.memos.push({ id: uid('m'), author: state.user, text: text, time: hh + ':' + mm });
        save(KEYS.memos, state.memos);
        $('memoInput').value = '';
        renderMemos();
      });

      // ============================================================
      // GLOBAL SEARCH (highlight matching items)
      // ============================================================
      $('globalSearch').addEventListener('input', function () {
        var q = ($('globalSearch').value || '').trim().toLowerCase();
        var match = function (s) { return q === '' || (s || '').toLowerCase().indexOf(q) !== -1; };
        // quick links
        Array.from(document.querySelectorAll('.q-link')).forEach(function (n) {
          var label = n.querySelector('.label').textContent;
          n.style.opacity = match(label) ? '' : '0.3';
        });
        // goals
        Array.from(document.querySelectorAll('.goal-card')).forEach(function (n) {
          var name = (n.querySelector('.goal-name') || {}).textContent || '';
          n.style.opacity = match(name) ? '' : '0.25';
        });
        // timeline bars
        Array.from(document.querySelectorAll('.t-bar')).forEach(function (n) {
          var title = (n.querySelector('.t-bar-title') || {}).textContent || '';
          n.style.opacity = match(title) ? '' : '0.25';
        });
        // memos
        Array.from(document.querySelectorAll('.bubble')).forEach(function (n) {
          var t = n.firstChild ? (n.firstChild.textContent || '') : '';
          n.style.opacity = match(t) ? '' : '0.3';
        });
      });
      // Cmd/Ctrl+K to focus search
      document.addEventListener('keydown', function (e) {
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
          e.preventDefault();
          $('globalSearch').focus();
        }
        if (e.key === 'Escape') { hideModal(); }
      });

      // ============================================================
      // INITIAL RENDER
      // ============================================================
      renderSidebar();
      renderQuickLinks();
      renderGoals();
      renderTimeline();
      renderMemos();
      setView(state.activeView || 'dashboardView');

      // ============================================================
      // FIREBASE REALTIME SYNC
      // ============================================================
      // Map shared keys → state property + render function.
      var STATE_PROP = {};
      STATE_PROP[KEYS.ql]       = 'ql';
      STATE_PROP[KEYS.goals]    = 'goals';
      STATE_PROP[KEYS.range]    = 'range';
      STATE_PROP[KEYS.events]   = 'events';
      STATE_PROP[KEYS.memos]    = 'memos';
      STATE_PROP[KEYS.sidebar]  = 'sidebar';
      STATE_PROP[KEYS.meetings] = 'meetings';

      var RENDER_FN = {};
      RENDER_FN[KEYS.ql]       = renderQuickLinks;
      RENDER_FN[KEYS.goals]    = renderGoals;
      RENDER_FN[KEYS.range]    = renderTimeline;
      RENDER_FN[KEYS.events]   = renderTimeline;
      RENDER_FN[KEYS.memos]    = renderMemos;
      RENDER_FN[KEYS.sidebar]  = renderSidebar;
      RENDER_FN[KEYS.meetings] = renderMeetings;

      function attachFirebaseListeners() {
        if (!window.__cvDb) return;
        Object.keys(FIREBASE_PATHS).forEach(function (key) {
          var path = FIREBASE_PATHS[key];
          var stateProp = STATE_PROP[key];
          var renderFn = RENDER_FN[key];
          window.__cvDb.ref('cvens/' + path).on('value', function (snap) {
            var val = snap.val();
            if (val === null || val === undefined) {
              // Empty in cloud → push our current local state as initial value
              window.__cvDb.ref('cvens/' + path).set(state[stateProp]).catch(function (e) {
                console.warn('Initial push failed:', e);
              });
              return;
            }
            // Got cloud data — update local state, cache to localStorage, re-render
            state[stateProp] = val;
            try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
            if (renderFn) {
              try { renderFn(); } catch (e) { console.warn('Render after sync failed:', e); }
            }
          }, function (err) {
            console.warn('Firebase listener error for', path, err);
          });
        });

        // Connection status indicator (optional)
        window.__cvDb.ref('.info/connected').on('value', function (snap) {
          var connected = !!snap.val();
          var dot = document.getElementById('connDot');
          if (dot) {
            dot.style.background = connected ? '#7fd49a' : '#d8819f';
            dot.title = connected ? '클라우드 연결됨 (실시간 동기화)' : '오프라인 — 변경사항은 연결되면 반영됩니다';
          }
        });
      }
      attachFirebaseListeners();
      if (state.user && TEAM.indexOf(state.user) !== -1) {
        $('whoami').textContent = state.user;
      } else {
        showPicker();
      }
    })();
  </script>
</body>
</html>
